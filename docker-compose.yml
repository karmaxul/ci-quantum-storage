services:

  geth:
    build:
      context: .
      dockerfile: Dockerfile.geth
    ports:
      - "8545:8545"
    volumes:
      - geth-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf",
             "-X", "POST", "http://localhost:8545",
             "-H", "Content-Type: application/json",
             "-d", '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}']
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  rs-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    ports:
      - "8080:8080"
    environment:
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS:-0x5FbDB2315678afecb367f032d93F642f64180aa3}
      - STORE_PRIVATE_KEY=${STORE_PRIVATE_KEY:-b71c71a67e1177ad4e901695e1b4b9ee17ae16c6668d313eac2f96dbcda3f291}
      - GETH_URL=http://geth:8545
      - LISTEN_ADDR=:8080
      - SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL:-}
      - SEPOLIA_CONTRACT_ADDRESS=${SEPOLIA_CONTRACT_ADDRESS:-}
      - ORACLE_PRIVATE_KEY=${ORACLE_PRIVATE_KEY:-}
      - API_KEYS=${API_KEYS:-}
    depends_on:
      geth:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  geth-data: