<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealChain</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0e17;
      --surface: #111827;
      --surface2:#162033;
      --border:  #1f2d45;
      --accent:  #00d4ff;
      --accent2: #7c3aed;
      --success: #10b981;
      --error:   #ef4444;
      --warn:    #f59e0b;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 880px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── Header ── */
    header { margin-bottom: 40px; }

    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }

    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    h1 {
      font-size: 2rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-bar {
      display: flex; flex-wrap: wrap; gap: 16px;
      font-family: var(--mono); font-size: 12px; color: var(--muted);
    }

    .status-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: var(--success);
      margin-right: 6px; animation: pulse 2s infinite;
    }

    .status-dot.err { background: var(--error); animation: none; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 26px;
      margin-bottom: 18px;
    }

    .card-title {
      font-size: 11px; font-family: var(--mono);
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--accent); margin-bottom: 18px;
    }

    /* ── Form ── */
    .field { margin-bottom: 13px; }

    label {
      display: block; font-size: 11px; font-family: var(--mono);
      color: var(--muted); margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 1px;
    }

    input[type="text"] {
      width: 100%; padding: 11px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text);
      font-family: var(--mono); font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"].invalid { border-color: var(--error); }

    .field-hint { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
    .field-error { font-size: 11px; color: var(--error); margin-top: 4px; font-family: var(--mono); display: none; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

    button {
      padding: 10px 20px; font-family: var(--mono); font-size: 13px;
      font-weight: 600; border: none; border-radius: 7px;
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
    }

    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover:not(:disabled) { background: #33ddff; transform: translateY(-1px); }

    .btn-secondary {
      background: transparent; color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-secondary:hover:not(:disabled) { background: rgba(0,212,255,.08); }

    .btn-danger {
      background: transparent; color: var(--error);
      border: 1px solid var(--error);
    }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,.08); }

    .btn-sm { padding: 6px 12px; font-size: 11px; }

    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Inline row ── */
    .row { display: flex; gap: 10px; align-items: flex-end; }
    .row .field { flex: 1; margin-bottom: 0; }

    /* ── Result box ── */
    .result-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
      font-family: var(--mono); font-size: 13px; line-height: 1.75;
      min-height: 52px; white-space: pre-wrap; word-break: break-all;
      color: var(--muted); margin-top: 14px;
    }

    .result-box.ok  { border-color: var(--success); color: var(--success); }
    .result-box.err { border-color: var(--error);   color: var(--error); }
    .result-box a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }
    .result-box a:hover { opacity: .75; }

    /* ── Copy button ── */
    .copy-btn {
      background: rgba(0,212,255,.1); border: 1px solid var(--border);
      color: var(--accent); border-radius: 5px;
      padding: 2px 8px; font-size: 11px; cursor: pointer;
      font-family: var(--mono); transition: background 0.15s;
      vertical-align: middle; margin-left: 6px;
    }
    .copy-btn:hover { background: rgba(0,212,255,.2); }
    .copy-btn.copied { color: var(--success); border-color: var(--success); }

    /* ── Records list ── */
    .records-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
    }

    .record-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
      margin-bottom: 10px; font-family: var(--mono); font-size: 13px;
    }

    .record-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px;
    }

    .record-id {
      font-size: 11px; color: var(--accent); font-weight: 600;
      background: rgba(0,212,255,.08); padding: 3px 8px;
      border-radius: 4px;
    }

    .record-label { color: var(--text); font-size: 13px; }

    .record-meta {
      font-size: 11px; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px;
    }

    .record-preview {
      color: var(--text); font-size: 12px;
      background: var(--bg); border-radius: 5px;
      padding: 6px 10px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    .record-actions { display: flex; gap: 6px; margin-top: 10px; }

    .empty-state {
      text-align: center; padding: 32px;
      color: var(--muted); font-family: var(--mono); font-size: 13px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 18px;
      font-family: var(--mono); font-size: 13px;
      color: var(--text); z-index: 100;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s; pointer-events: none;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok   { border-color: var(--success); color: var(--success); }
    #toast.err  { border-color: var(--error);   color: var(--error); }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      body { padding: 20px 14px; }
      h1 { font-size: 1.5rem; }
      .row { flex-direction: column; }
      .row button { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">⛓</div>
      <h1>HealChain</h1>
    </div>
    <div class="status-bar">
      <span id="svc-status"><span class="status-dot"></span>Service: localhost:8080</span>
      <span id="geth-status"><span class="status-dot"></span>Geth: localhost:8545</span>
      <span id="contract-status" style="display:none"></span>
    </div>
  </header>

  <!-- Store -->
  <div class="card">
    <div class="card-title">// Store Data On-Chain</div>

    <div class="field">
      <label>Data (plain text)</label>
      <input type="text" id="dataInput" value="Hello from HealChain!"
        placeholder="Text to store" oninput="validateData()">
      <div class="field-error" id="dataErr">Data cannot be empty.</div>
    </div>

    <div class="field">
      <label>Label <span style="color:var(--muted)">(max 64 chars)</span></label>
      <input type="text" id="labelInput" value="browser demo"
        placeholder="Record label" maxlength="64" oninput="validateLabel()">
      <div class="field-error" id="labelErr">Label is too long (max 64 characters).</div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="storeBtn" onclick="storeData()">Store Data</button>
      <button class="btn-secondary" onclick="clearStore()">Clear</button>
    </div>

    <div class="result-box" id="storeResult">Waiting for input...</div>
  </div>

  <!-- Retrieve -->
  <div class="card">
    <div class="card-title">// Retrieve Record</div>
    <div class="row">
      <div class="field">
        <label>Record ID</label>
        <input type="text" id="retrieveId" value="0" placeholder="0">
      </div>
      <button class="btn-primary" id="retrieveBtn" onclick="retrieveData()" style="margin-bottom:0">
        Retrieve
      </button>
    </div>
    <div class="result-box" id="retrieveResult">Enter a record ID and click Retrieve.</div>
  </div>

  <!-- Records -->
  <div class="card">
    <div class="records-header">
      <div class="card-title" style="margin-bottom:0">// Recent Records</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="maxRecords" value="10" placeholder="10"
          style="width:64px;padding:8px 10px;margin:0">
        <button class="btn-secondary btn-sm" id="refreshBtn" onclick="loadRecords()">Refresh</button>
      </div>
    </div>
    <div id="records-list"><div class="empty-state">Click Refresh to load records.</div></div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const SVC = "http://localhost:8080";
  // Update for testnet:
  //   Sepolia:  https://sepolia.etherscan.io/tx
  //   Mainnet:  https://etherscan.io/tx
  const EXPLORER_BASE = "https://sepolia.etherscan.io/tx";

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function strToHex(str) {
    return "0x" + Array.from(new TextEncoder().encode(str))
      .map(b => b.toString(16).padStart(2, "0")).join("");
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function setResult(id, html, state) {
    const el = document.getElementById(id);
    el.innerHTML = html;
    el.className = "result-box" + (state ? " " + state : "");
  }

  function setLoading(btnId, loading, label) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner"></span>${label}` : label;
  }

  function toast(msg, type = "") {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "show" + (type ? " " + type : "");
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ""; }, 3000);
  }

  function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = "✓ copied";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "copy"; btn.classList.remove("copied"); }, 1500);
    });
  }

  // ── Validation ───────────────────────────────────────────────────────────────

  function validateData() {
    const val = document.getElementById("dataInput").value.trim();
    const err = document.getElementById("dataErr");
    const inp = document.getElementById("dataInput");
    if (!val) {
      inp.classList.add("invalid"); err.style.display = "block"; return false;
    }
    inp.classList.remove("invalid"); err.style.display = "none"; return true;
  }

  function validateLabel() {
    const val = document.getElementById("labelInput").value;
    const err = document.getElementById("labelErr");
    const inp = document.getElementById("labelInput");
    if (val.length > 64) {
      inp.classList.add("invalid"); err.style.display = "block"; return false;
    }
    inp.classList.remove("invalid"); err.style.display = "none"; return true;
  }

  // ── Status check ─────────────────────────────────────────────────────────────

  async function checkStatus() {
    try {
      const res = await fetch(`${SVC}/health`);
      const json = await res.json();
      document.getElementById("svc-status").innerHTML =
        `<span class="status-dot"></span>Service: localhost:8080`;
      document.getElementById("geth-status").innerHTML =
        json.geth === "ok"
          ? `<span class="status-dot"></span>Geth: block ${json.lastBlock}`
          : `<span class="status-dot err"></span>Geth: unreachable`;
      const cs = document.getElementById("contract-status");
      cs.style.display = "inline";
      cs.innerHTML = `<span class="status-dot"></span>Records: ${json.totalRecords || "?"}`;
    } catch {
      document.getElementById("svc-status").innerHTML =
        `<span class="status-dot err"></span>Service: unreachable`;
    }
  }

  // ── Store ────────────────────────────────────────────────────────────────────

  async function storeData() {
    if (!validateData() || !validateLabel()) return;

    const raw   = document.getElementById("dataInput").value.trim();
    const label = document.getElementById("labelInput").value.trim() || "browser demo";

    setLoading("storeBtn", true, "Storing...");
    setResult("storeResult", "Sending to service...", "");

    try {
      const res = await fetch(`${SVC}/storeOnChain`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: strToHex(raw), label })
      });

      const json = await res.json();

      if (!res.ok) {
        setResult("storeResult", `❌ Error: ${escapeHtml(json.error || res.statusText)}`, "err");
        toast("Store failed", "err");
        return;
      }

      const txLink = `<a href="${EXPLORER_BASE}/${json.tx}" target="_blank" rel="noopener">${escapeHtml(json.tx)}</a>`;
      const retrieveLink = `<a href="${SVC}/retrieve?id=${json.recordId}" target="_blank" rel="noopener">${escapeHtml(json.retrieveUrl)}</a>`;

      setResult("storeResult",
        `✅ Stored successfully!\n` +
        `Record ID:    ${escapeHtml(json.recordId)} <button class="copy-btn" onclick="copyToClipboard('${json.recordId}', this)">copy</button>\n` +
        `Tx:           ${txLink}\n` +
        `Original:     ${escapeHtml(json.originalSize)} bytes\n` +
        `Encoded:      ${escapeHtml(json.encodedSize)} bytes\n` +
        `Retrieve URL: ${retrieveLink} <button class="copy-btn" onclick="copyToClipboard('${SVC}/retrieve?id=${json.recordId}', this)">copy</button>`,
        "ok"
      );

      document.getElementById("retrieveId").value = json.recordId;
      toast("✅ Stored successfully!", "ok");
      loadRecords();

    } catch (err) {
      setResult("storeResult", `❌ Network error: ${escapeHtml(err.message)}`, "err");
      toast("Network error", "err");
    } finally {
      setLoading("storeBtn", false, "Store Data");
    }
  }

  function clearStore() {
    setResult("storeResult", "Waiting for input...", "");
    document.getElementById("dataInput").classList.remove("invalid");
    document.getElementById("dataErr").style.display = "none";
  }

  // ── Retrieve ─────────────────────────────────────────────────────────────────

  async function retrieveData(id) {
    const idVal = id !== undefined ? id : document.getElementById("retrieveId").value.trim();
    if (idVal === "") {
      setResult("retrieveResult", "⚠ Enter a record ID.", "err"); return;
    }
    if (id === undefined) document.getElementById("retrieveId").value = idVal;

    setLoading("retrieveBtn", true, "Retrieving...");
    setResult("retrieveResult", "Fetching from chain...", "");

    try {
      const res  = await fetch(`${SVC}/retrieve?id=${encodeURIComponent(idVal)}`);
      const json = await res.json();

      if (!res.ok) {
        setResult("retrieveResult", `❌ Error: ${escapeHtml(json.error || res.statusText)}`, "err");
        return;
      }

      setResult("retrieveResult",
        `✅ Record ${escapeHtml(json.recordId)}\n` +
        `Text: ${escapeHtml(json.text)}\n` +
        `Hex:  ${escapeHtml(json.data)}\n` +
        `Size: ${json.bytes} bytes`,
        "ok"
      );

    } catch (err) {
      setResult("retrieveResult", `❌ Network error: ${escapeHtml(err.message)}`, "err");
    } finally {
      setLoading("retrieveBtn", false, "Retrieve");
    }
  }

  // ── Delete ───────────────────────────────────────────────────────────────────

  async function deleteRecord(id) {
    if (!confirm(`Delete record ${id}? This cannot be undone.`)) return;
    toast(`Deleting record ${id}...`);
    try {
      const res  = await fetch(`${SVC}/delete?id=${id}`);
      const json = await res.json();
      if (!res.ok) {
        toast(`Delete failed: ${json.error}`, "err"); return;
      }
      toast(`✅ Record ${id} deleted`, "ok");
      loadRecords();
    } catch (err) {
      toast("Network error: " + err.message, "err");
    }
  }

  // ── Records list ─────────────────────────────────────────────────────────────

  async function loadRecords() {
    const max  = parseInt(document.getElementById("maxRecords").value) || 10;
    const list = document.getElementById("records-list");
    const btn  = document.getElementById("refreshBtn");

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span>Loading...`;
    list.innerHTML = "";

    try {
      const res  = await fetch(`${SVC}/listRecords`);
      const json = await res.json();

      if (!res.ok || !json.records) {
        list.innerHTML = `<div class="empty-state">Failed to load records.</div>`;
        return;
      }

      const records = json.records.slice(0, max);

      if (records.length === 0) {
        list.innerHTML = `<div class="empty-state">No records found. Store some data first.</div>`;
        return;
      }

      list.innerHTML = records.map(r => `
        <div class="record-item">
          <div class="record-top">
            <div>
              <span class="record-id">ID ${escapeHtml(r.id)}</span>
              <span class="record-label" style="margin-left:10px">${escapeHtml(r.label)}</span>
            </div>
            <div class="record-actions">
              <button class="btn-secondary btn-sm" onclick="retrieveData('${r.id}')">Retrieve</button>
              <button class="btn-danger btn-sm" onclick="deleteRecord('${r.id}')">Delete</button>
            </div>
          </div>
          <div class="record-meta">
            <span>Original: ${r.originalSize} bytes</span>
            <span>Encoded: ${r.encodedSize} bytes</span>
            <span>Shards: ${r.dataShards}+${r.parityShards}</span>
            <span>Owner: ${r.owner.slice(0,10)}...</span>
          </div>
        </div>
      `).join("");

    } catch (err) {
      list.innerHTML = `<div class="empty-state">Error: ${escapeHtml(err.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = "Refresh";
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────────

  window.onload = () => {
    checkStatus();
    loadRecords();
    // Refresh status every 15 seconds
    setInterval(checkStatus, 15000);
  };
</script>
</body>
</html>
